name: build

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify-and-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck shared
        run: bunx tsc --noEmit -p packages/shared/tsconfig.json
      - name: Typecheck broker
        run: bunx tsc --noEmit -p packages/broker/tsconfig.json
      - name: Typecheck channel
        run: bunx tsc --noEmit -p packages/channel/tsconfig.json

      - name: Build bundles
        run: bun run build

      - name: Commit refreshed bundles if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/
          if git diff --cached --quiet; then
            echo "Bundles already up to date — nothing to commit."
          else
            git commit -m "build: refresh bundles [skip ci]"
            git push
          fi
